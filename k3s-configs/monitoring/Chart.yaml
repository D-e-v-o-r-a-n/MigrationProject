apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: monitoring-chart
  namespace: kube-system
spec:
  repo: https://prometheus-community.github.io/helm-charts
  chart: kube-prometheus-stack
  targetNamespace: monitoring
  createNamespace: true
  valuesContent: |-
    grafana:
      service:
        type: NodePort
        nodePort: 30002
    prometheus:
      service:
        type: NodePort
        nodePort: 30096
